version: '3.8'

services:
  my_ubuntu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_ubuntu
    ports:
      - "4400:80"      # Nginx Web 服务
      - "4401:5001"    # Stock Monitor Web 界面
      - "4422:4422"    # SSH 远程访问
    volumes:
      - /vol1/1000/docker/my-ubuntu/run:/data           # 数据卷
      - /vol1/1009/paddle_mount:/paddle                 # PaddleOCR 模型
    restart: unless-stopped
    privileged: false
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - PYTHONPATH=/root/crawlers/spiders:/root
    networks:
      - my_network

networks:
  my_network:
    driver: bridge
